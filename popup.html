<!DOCTYPE html>
<html>
<head>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      padding: 20px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 600;
    }

    .header img {
      width: 28px;
      height: 28px;
    }

    .description {
      font-size: 12px;
      color: #8b949e;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 16px;
    }

    .toggle-label {
      font-size: 13px;
      font-weight: 500;
    }

    .switch {
      position: relative;
      width: 40px;
      height: 22px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: #30363d;
      border-radius: 22px;
      transition: background 0.2s;
    }

    .slider::before {
      content: "";
      position: absolute;
      width: 16px;
      height: 16px;
      left: 3px;
      bottom: 3px;
      background: #e6edf3;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    .switch input:checked + .slider {
      background: #238636;
    }

    .switch input:checked + .slider::before {
      transform: translateX(18px);
    }

    .patterns {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 12px 14px;
    }

    .patterns h2 {
      font-size: 12px;
      font-weight: 600;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .pattern-list {
      list-style: none;
    }

    .pattern-list li {
      font-size: 12px;
      color: #e6edf3;
      padding: 4px 0;
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
    }

    .pattern-list li::before {
      content: "•";
      color: #238636;
      margin-right: 8px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>TLDR PR</h1>
  </div>
  <p class="description">
    Automatically marks test files as "Viewed" on GitHub pull request reviews.
  </p>
  <div class="toggle-row">
    <span class="toggle-label">Enabled</span>
    <label class="switch">
      <input type="checkbox" id="toggle" checked>
      <span class="slider"></span>
    </label>
  </div>
  <div class="patterns">
    <h2>Auto-viewed patterns</h2>
    <ul class="pattern-list">
      <li>*.spec.*</li>
      <li>*.test.*</li>
      <li>__tests__/**</li>
      <li>test/**</li>
    </ul>
  </div>
  <script src="popup.js"></script>
</body>
</html>
